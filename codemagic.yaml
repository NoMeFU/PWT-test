workflows:
  ios-workflow:
    name: iOS TestFlight Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      vars:
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        APP_KEY_VALUE: "default_app_key_here"
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          # Fetch certificates and profiles from Apple
          app-store-connect fetch-signing-files "com.lawbug.wagetimekeeper" --project-id "$APP_STORE_CONNECT_PROJECT_ID" --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" --key-id "$APP_STORE_CONNECT_KEY_ID" --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"
          keychain add-certificates
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build Flutter IPA
        script: |
          flutter build ipa --release \
            --dart-define=APP_KEY_VALUE=$APP_KEY_VALUE \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - YOUR_EMAIL@example.com # You can change this


  web-workflow:
    name: Web PWA Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      vars:
        APP_KEY_VALUE: "default_app_key_here"
      flutter: stable

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true

    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build Flutter Web
        script: |
          flutter build web --release --base-href "/PWT-test/" --dart-define=APP_KEY_VALUE=$APP_KEY_VALUE

    artifacts:
      - build/web/**

    publishing:
      github_pages:
        artifact_level: true
        branch: gh-pages
